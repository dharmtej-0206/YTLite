name: Build Custom Focus App
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link to decrypted YouTube IPA (Use your GitHub Release link!)'
        required: true
      ytlite_version:
        description: 'YTLite Version to inject'
        default: '5.2b4'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Custom Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install make ldid dpkg

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk ${{ github.workspace }}/theos/sdks

      - name: Compile Focus Tweak
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          export THEOS=${{ github.workspace }}/theos
          make clean
          make package SIDELOADED=1

      - name: Prepare Injection Folder
        run: |
          mkdir -p inject
          dpkg-deb -x packages/*.deb inject/
          cp inject/Library/MobileSubstrate/DynamicLibraries/Focus.dylib .

      - name: Download Official YTLite
        run: |
          wget "https://github.com/dayanch96/YTLite/releases/download/v${{ github.event.inputs.ytlite_version }}/com.dvntm.ytlite_${{ github.event.inputs.ytlite_version }}_iphoneos-arm.deb" -O ytlite.deb
          mkdir -p ytlite_extract
          dpkg-deb -x ytlite.deb ytlite_extract/
          cp ytlite_extract/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib .
          cp -r "ytlite_extract/Library/Application Support/YTLite.bundle" .

      - name: Insert Blocklist
        run: |
          cp blocklist.ytb YTLite.bundle/ || echo "Warning: blocklist.ytb not found in repo root!"

      - name: Download YouTube IPA
        run: wget "${{ github.event.inputs.ipa_url }}" --no-verbose -O YouTube.ipa

      - name: Inject using Cyan
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          ~/.local/bin/cyan -i YouTube.ipa -f Focus.dylib YTLite.dylib YTLite.bundle -o YouTube_Focus.ipa

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Focus-App
          path: YouTube_Focus.ipa
